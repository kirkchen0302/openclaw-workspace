name: Deploy invoice-prototype to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'invoice-prototype/**'
      - '.github/workflows/deploy-invoice-prototype.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: INVOICE-BFD85

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: invoice-prototype/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: invoice-prototype

      - name: Build
        run: npm run build
        working-directory: invoice-prototype
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.PM_PROTOTYPE_FIREBASE_API_KEY }}

      - name: Inject Firebase API key into static HTML dashboards
        run: |
          sed -i "s|__FIREBASE_API_KEY__|${{ secrets.PM_PROTOTYPE_FIREBASE_API_KEY }}|g" \
            invoice-prototype/dist/hyvs-mavs-dashboard.html
          sed -i "s|__FIREBASE_API_KEY__|${{ secrets.PM_PROTOTYPE_FIREBASE_API_KEY }}|g" \
            invoice-prototype/dist/audience-dashboard.html

      - name: Copy dashboards to clean URL paths
        run: |
          mkdir -p invoice-prototype/dist/dashboard/hyvs-mavs
          mkdir -p invoice-prototype/dist/dashboard/audience
          mkdir -p invoice-prototype/dist/prototype/ai_agent
          mkdir -p invoice-prototype/dist/prototype/ai_agent/0408_v1
          cp invoice-prototype/dist/hyvs-mavs-dashboard.html invoice-prototype/dist/dashboard/hyvs-mavs/index.html
          cp invoice-prototype/dist/audience-dashboard.html invoice-prototype/dist/dashboard/audience/index.html
          cp invoice-prototype/dist/index.html invoice-prototype/dist/prototype/ai_agent/index.html
          cp invoice-prototype/dist/index.html invoice-prototype/dist/prototype/ai_agent/0408_v1/index.html

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PM_PROTOTYPE }}
          channelId: live
          projectId: pm-prototype-a75ce
          entryPoint: invoice-prototype
