name: Deploy invoice-prototype to Firebase Hosting

# IMPORTANT:
# - Actual Firebase deploy target is `pm-prototype-a75ce`
# - This workflow now reads repository-level Actions secrets directly to avoid GitHub Environment scope issues
# - Required repository secrets: `PM_PROTOTYPE_FIREBASE_API_KEY`, `FIREBASE_SERVICE_ACCOUNT_PM_PROTOTYPE`
# - Dashboard HTML must never be deployed with `__FIREBASE_API_KEY__` still present
# - If secrets are updated, commit any tiny change here (preferred over rerunning an old failed run) to retrigger this workflow..

on:
  push:
    branches:
      - main
    paths:
      - 'invoice-prototype/**'
      - '.github/workflows/deploy-invoice-prototype.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: invoice-prototype/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: invoice-prototype

      - name: Debug secret presence
        run: |
          echo "environment=INVOICE_BFD85"
          if [ -n "${{ secrets.PM_PROTOTYPE_FIREBASE_API_KEY }}" ]; then
            echo "PM_PROTOTYPE_FIREBASE_API_KEY=present"
          else
            echo "PM_PROTOTYPE_FIREBASE_API_KEY=missing"
          fi
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT_PM_PROTOTYPE }}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_PM_PROTOTYPE=present"
          else
            echo "FIREBASE_SERVICE_ACCOUNT_PM_PROTOTYPE=missing"
          fi

      - name: Prepare deploy assets
        run: bash scripts/prepare_invoice_prototype_deploy.sh
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.PM_PROTOTYPE_FIREBASE_API_KEY }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PM_PROTOTYPE }}
          channelId: live
          projectId: pm-prototype-a75ce
          entryPoint: invoice-prototype
