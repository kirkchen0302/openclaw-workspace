name: Deploy invoice-prototype to Firebase Hosting

# IMPORTANT:
# - Keep workflow environment fixed at `INVOICE-BFD85`
# - `INVOICE-BFD85` is only the GitHub Environment label used for secrets storage
# - Actual Firebase deploy target is `pm-prototype-a75ce`
# - Do not rename the workflow environment unless secrets are migrated at the same time
# - Dashboard HTML must never be deployed with `__FIREBASE_API_KEY__` still present

on:
  push:
    branches:
      - main
    paths:
      - 'invoice-prototype/**'
      - '.github/workflows/deploy-invoice-prototype.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: INVOICE-BFD85

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: invoice-prototype/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: invoice-prototype

      - name: Prepare deploy assets
        run: bash scripts/prepare_invoice_prototype_deploy.sh
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.PM_PROTOTYPE_FIREBASE_API_KEY }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PM_PROTOTYPE }}
          channelId: live
          projectId: pm-prototype-a75ce
          entryPoint: invoice-prototype
